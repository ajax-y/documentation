site_name: aj4y
site_url: https://ajax-y.github.io/documentation/
site_description: "Ajay Elumalai (aj4y) - Portfolio, personal blog, and knowledge base covering ECE, Cyber Security, Systems Programming, and interactive web tools."
site_author: "Ajay Elumalai"
theme:
  name: material
  favicon: assets/eye.png
  icon:
    logo: fontawesome/solid/eye
  font:
    text: Raleway


  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections    
    - navigation.path
    - navigation.indexes
    - navigation.pruning     
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: deep orange
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: teal
      accent: deep orange

plugins:
  - search
  - blog:
      blog_dir: Blog
      post_date_format: yyyy/MM/dd
      post_url_format: "{slug}"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/ajax-y
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/ajay_elumalai
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/ajax-e
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/aj4y_elumalai

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Knowledge:
      - Overview: Knowledge/index.md
      - Cyber Security: Knowledge/Cyber Security/index.md
      - breachlab:
          - Overview: Knowledge/Cyber Security/breachlab/index.md
          - Ghost:
              - Level 0: Knowledge/Cyber Security/breachlab/ghost/L0.md
              - Level 1: Knowledge/Cyber Security/breachlab/ghost/L1.md
              - Level 2: Knowledge/Cyber Security/breachlab/ghost/L2.md
      - overthewire: Knowledge/Cyber Security/overthewire/index.md
  - Blog: Blog/index.md
  - About: About/index.md

copyright: |
  Copyrighted &copy; at 2026 by <a href="https://github.com" target="_blank" rel="noopener">AJ4Y</a>
